# Gitflow: begin a patch (hotfix) release — fix-first.
#
# A patch ships an ALREADY-REVIEWED fix to prod, so this never cuts an empty
# branch: it requires the fix commit(s) up front, cuts hotfix/X.Y.Z off the last
# release TAG (a clean patch base, not main HEAD), cherry-picks the fix onto it,
# and pushes. The non-empty branch lets the hotfix -> main PR open immediately
# (at Start, not Finish), and the push fires auto-rc.yml -> rc0.
#
# The fix is expected to already live on dev (reviewed there); pass its squash
# SHA(s). The start-patch-release skill resolves a dev PR number to its SHA and
# dispatches this workflow.
#
# Shipped to main + dev by Finish Hotfix Release (approval + green required).
name: Start Hotfix Release

on:
  workflow_dispatch:
    inputs:
      fix_commits:
        description: "Space/comma-separated commit SHA(s) to cherry-pick (the already-reviewed fix, normally from dev)"
        required: true
        type: string
      version:
        description: "Patch version, e.g. 2.89.1 (blank = auto next patch from latest final tag)"
        required: false
        type: string

permissions:
  contents: read # all writes go through the GitHub App token below

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app
        with:
          app-id: ${{ secrets.MERGE_BOT_APP_ID }}
          private-key: ${{ secrets.MERGE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Compute version + base tag
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet origin
          # The patch base is the highest final release tag (X.Y.Z, no pre-release).
          base=$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          [[ -n "$base" ]] || { echo "::error::No final release tag found to patch from."; exit 1; }
          if [[ -n "$INPUT_VERSION" ]]; then
            V="$INPUT_VERSION"
          else
            IFS=. read -r MA MI PA <<< "$base"
            V="$MA.$MI.$((PA + 1))"
          fi
          echo "Patch base tag: $base -> version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "branch=hotfix/$V" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Cut hotfix branch off the base tag + cherry-pick the fix
        env:
          V: ${{ steps.ver.outputs.version }}
          B: ${{ steps.ver.outputs.branch }}
          BASE: ${{ steps.ver.outputs.base }}
          FIX_COMMITS: ${{ inputs.fix_commits }}
        run: |
          set -euo pipefail
          # Idempotent: a re-run after the branch exists skips the cut + cherry-pick.
          if git ls-remote --exit-code --heads origin "$B" >/dev/null 2>&1; then
            echo "$B already exists; skipping cut + cherry-pick (idempotent re-run)."
            exit 0
          fi

          # Normalize the SHA list (commas/whitespace -> spaces) and verify each.
          shas=$(echo "$FIX_COMMITS" | tr ',' ' ')
          [[ -n "${shas// }" ]] || { echo "::error::fix_commits is empty."; exit 1; }
          for s in $shas; do
            git cat-file -e "${s}^{commit}" 2>/dev/null || { echo "::error::commit $s not found in history."; exit 1; }
          done

          git config user.name "fides-release-bot[bot]"
          git config user.email "fides-release-bot@users.noreply.github.com"

          # Branch off the base tag (clean patch base), cherry-pick, then push.
          git checkout -B "$B" "$BASE"
          for s in $shas; do
            # -x appends "(cherry picked from commit <sha>)" -> traces the patch
            # commit back to its reviewed dev original.
            if ! git cherry-pick -x "$s"; then
              git cherry-pick --abort || true
              echo "::error::cherry-pick of $s onto $B conflicts. Resolve on a local $B off tag $BASE, push it, then re-run (idempotent)."
              exit 1
            fi
          done

          # Pushing the non-empty branch fires auto-rc.yml -> rc0.
          git push origin "$B"

      - name: Open hotfix -> main PR
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          V: ${{ steps.ver.outputs.version }}
          B: ${{ steps.ver.outputs.branch }}
          BASE: ${{ steps.ver.outputs.base }}
        run: |
          set -euo pipefail
          if gh pr list --head "$B" --base main --state open --json number -q '.[0].number' | grep -q '[0-9]'; then
            echo "hotfix -> main PR already open"; exit 0
          fi
          gh pr create --base main --head "$B" \
            --title "Hotfix $V" \
            --body "Patch \`$V\` off tag \`$BASE\`, carrying the cherry-picked fix.

          Add further fixes by PR into \`$B\`; each push cuts a new RC automatically.

          Shipped to \`main\` and back-merged to \`dev\` by **Finish Hotfix Release** (requires approval + green checks)." \
            --label hotfix
